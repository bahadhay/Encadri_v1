<div class="video-call-container">
  <!-- Header -->
  <div class="call-header">
    <h2>{{ meetingTitle || 'Video Meeting' }}</h2>
    <span class="participant-count">{{ participantCount() }} participants</span>
  </div>

  <!-- Error Message -->
  <div *ngIf="error()" class="error-banner">
    <span>⚠️ {{ error() }}</span>
  </div>

  <!-- Video Grid -->
  <div *ngIf="isCallActive()" class="video-grid">
    <!-- Local video (your camera) -->
    <div class="video-tile local-video" [class.video-off]="!isVideoOn()">
      <div #localVideoContainer class="video-container"></div>
      <div class="video-avatar" *ngIf="!isVideoOn()">
        <div class="avatar-circle">
          <span class="avatar-initials">{{ getUserInitials() }}</span>
        </div>
        <div class="camera-off-indicator">
          <span>📹</span>
          <span class="off-text">Camera is off</span>
        </div>
      </div>
      <div class="video-label">
        <span>You</span>
        <span *ngIf="isMuted()" class="mic-status">🎤</span>
      </div>
    </div>

    <!-- Remote videos rendered dynamically by TypeScript -->
  </div>

  <!-- Waiting Room -->
  <div *ngIf="!isCallActive() && !isConnecting()" class="waiting-room">
    <app-ui-card>
      <div class="waiting-content">
        <div class="camera-preview" [class.video-off]="!isVideoOn()">
          <div #previewVideoContainer class="preview-container"></div>
          <div class="preview-avatar" *ngIf="!isVideoOn()">
            <div class="avatar-circle">
              <span class="avatar-initials">{{ getUserInitials() }}</span>
            </div>
            <div class="camera-off-indicator">
              <span>📹</span>
              <span class="off-text">Camera is off</span>
            </div>
          </div>
        </div>

        <h3>Ready to join?</h3>
        <p>Setup your camera and microphone</p>

        <!-- Preview Controls -->
        <div class="preview-controls">
          <button
            class="preview-control-btn"
            [class.active]="!isMuted()"
            (click)="togglePreviewMic()"
            title="Toggle Microphone">
            <span *ngIf="!isMuted()">🎤</span>
            <span *ngIf="isMuted()" class="muted">🎤</span>
            <span class="btn-label">{{ isMuted() ? 'Mic Off' : 'Mic On' }}</span>
          </button>

          <button
            class="preview-control-btn"
            [class.active]="isVideoOn()"
            (click)="togglePreviewCamera()"
            title="Toggle Camera">
            <span *ngIf="isVideoOn()">📹</span>
            <span *ngIf="!isVideoOn()" class="off">📹</span>
            <span class="btn-label">{{ isVideoOn() ? 'Camera On' : 'Camera Off' }}</span>
          </button>
        </div>

        <app-ui-button
          variant="primary"
          size="lg"
          (click)="startCall()">
          Join Meeting
        </app-ui-button>
      </div>
    </app-ui-card>
  </div>

  <!-- Connecting State -->
  <div *ngIf="isConnecting()" class="connecting-state">
    <div class="spinner"></div>
    <p>Connecting to meeting...</p>
  </div>

  <!-- Call Controls -->
  <div *ngIf="isCallActive()" class="call-controls">
    <div class="control-buttons">
      <!-- Mute/Unmute -->
      <button
        class="control-btn"
        [class.active]="!isMuted()"
        (click)="toggleMute()"
        title="Toggle Microphone">
        <span *ngIf="!isMuted()">🎤</span>
        <span *ngIf="isMuted()" class="muted">🎤</span>
      </button>

      <!-- Video On/Off -->
      <button
        class="control-btn"
        [class.active]="isVideoOn()"
        (click)="toggleVideo()"
        title="Toggle Camera">
        <span *ngIf="isVideoOn()">📹</span>
        <span *ngIf="!isVideoOn()" class="off">📹</span>
      </button>

      <!-- Share Screen -->
      <button
        class="control-btn"
        (click)="shareScreen()"
        title="Share Screen">
        <span>🖥️</span>
      </button>

      <!-- End Call -->
      <button
        class="control-btn end-call"
        (click)="endCall()"
        title="Leave Meeting">
        <span>📞</span>
      </button>
    </div>
  </div>
</div>
